<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Megafuds tiene una receta (o varias) para ti 😉💚</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --green: #62B32C; --green-dark: #4a8a1f; --green-deep: #2d5a12;
  --green-light: #edf7e1; --green-mid: #c8e8a8;
  --cream: #faf8f3; --cream-dark: #f0ece0;
  --text: #1e1e1e; --text-muted: #6b6b6b;
  --white: #ffffff; --border: #e2eed4;
  --radius: 18px; --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
.app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--white); box-shadow: 0 0 60px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
.header { background: var(--green); padding: 20px 24px 18px; text-align: center; }
.header img { height: 52px; }
.header-sub { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600; margin-top: 6px; }
.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }
.selector { padding: 28px 24px 32px; flex: 1; }
.sel-intro { margin-bottom: 28px; }
.sel-intro h2 { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
.sel-intro p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
.sel-group { margin-bottom: 24px; }
.sel-group-title { font-size: 11px; font-weight: 800; color: var(--green-dark); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mood-btn { padding: 16px 12px; border-radius: var(--radius); border: 2px solid var(--border); background: var(--white); cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; text-align: center; }
.mood-btn:hover { border-color: var(--green-mid); background: var(--green-light); }
.mood-btn.sel { border-color: var(--green); background: var(--green-light); }
.mood-btn.sel .mood-title { color: var(--green-dark); }
.mood-emoji { font-size: 28px; display: block; margin-bottom: 6px; }
.mood-title { font-size: 14px; font-weight: 800; color: var(--text); display: block; }
.mood-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: block; }
.time-grid { display: flex; gap: 10px; }
.time-btn { flex: 1; padding: 14px 8px; border-radius: var(--radius); border: 2px solid var(--border); background: var(--white); cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; text-align: center; }
.time-btn:hover { border-color: var(--green-mid); background: var(--green-light); }
.time-btn.sel { border-color: var(--green); background: var(--green-light); }
.time-btn.sel .time-label { color: var(--green-dark); }
.time-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
.time-label { font-size: 13px; font-weight: 800; color: var(--text); display: block; }
.time-sub { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
.btn-main { width: 100%; padding: 16px; border-radius: var(--radius); border: none; background: var(--green); color: white; font-size: 16px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; margin-top: 8px; }
.btn-main:hover:not([disabled]) { background: var(--green-dark); transform: translateY(-1px); }
.btn-main[disabled] { background: #d0d0d0; color: #a0a0a0; cursor: default; transform: none; }
.results { padding: 0; flex: 1; overflow-y: auto; }
.results-header { background: var(--green-light); border-bottom: 1px solid var(--border); padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; }
.results-title { font-size: 16px; font-weight: 900; color: var(--green-deep); }
.results-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.btn-back { background: var(--white); border: 1.5px solid var(--border); color: var(--text-muted); font-size: 13px; font-weight: 700; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-family: 'Nunito', sans-serif; white-space: nowrap; }
.btn-back:hover { border-color: var(--green); color: var(--green); }
.recipe-cards { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
.rcard { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 12px rgba(98,179,44,0.10); transition: all 0.2s; }
.rcard.open { border-color: var(--green); }
.rcard-header { padding: 16px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
.rcard-emoji { font-size: 32px; flex-shrink: 0; }
.rcard-info { flex: 1; }
.rcard-name { font-size: 16px; font-weight: 800; color: var(--text); line-height: 1.2; }
.rcard-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
.badge-time { background: #f0f0f0; color: var(--text-muted); }
.badge-protein { background: var(--green-light); color: var(--green-dark); }
.rcard-arrow { font-size: 13px; color: var(--text-muted); flex-shrink: 0; transition: transform 0.2s; }
.rcard.open .rcard-arrow { transform: rotate(180deg); }
.rcard-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
.rcard.open .rcard-body { display: block; }
.rb-section { margin-top: 14px; }
.rb-title { font-size: 10px; font-weight: 800; color: var(--green-dark); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.rb-ingr { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.rb-ingr li { font-size: 13px; color: var(--text); padding: 6px 10px; background: var(--cream); border-radius: 6px; display: flex; align-items: flex-start; gap: 6px; }
.rb-ingr li::before { content: "•"; color: var(--green); font-weight: 800; flex-shrink: 0; }
.rb-steps { display: flex; flex-direction: column; gap: 8px; }
.rb-step { display: flex; gap: 10px; align-items: flex-start; }
.rb-step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--green); color: white; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.rb-step-text { font-size: 13px; color: var(--text); line-height: 1.5; flex: 1; }
.rb-tip { background: var(--green-light); border-left: 3px solid var(--green); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 10px 12px; margin-top: 14px; }
.rb-tip p { font-size: 13px; color: var(--green-deep); line-height: 1.55; font-weight: 600; }
.results-footer { padding: 16px 20px 28px; text-align: center; }
.btn-restart { padding: 12px 28px; border-radius: var(--radius); border: 1.5px solid var(--border); background: transparent; color: var(--text-muted); font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
.btn-restart:hover { border-color: var(--green); color: var(--green); }
</style>
</head>

  });

function checkReady() {
  var btn = document.getElementById('btn-ver');
  if (selectedMood && selectedTime) {
    btn.removeAttribute('disabled');
  } else {
    btn.setAttribute('disabled', 'disabled');
  }
}

document.getElementById('btn-ver').addEventListener('click', function() {
  if (!selectedMood || !selectedTime) return;
  var key = selectedMood + '-' + selectedTime;
  var ids = COMBOS[key] || [];
  showResults(ids);
});

  selectedMood = null;
  selectedTime = null;

});

  document.getElementById('s2').classList.remove('active');

  var container = document.getElementById('recipe-cards');
  container.innerHTML = '';

  ids.forEach(function(id, idx) {
    var r = RECIPES[id];
    if (!r) return;

    var card = document.createElement('div');
    card.className = 'rcard';
    card.setAttribute('data-id', id);

    var ingrs = r.ingredientes.map(function(i) {
      return '<li>' + i + '</li>';
    }).join('');

    var steps = r.pasos.map(function(p, i) {
      return '<div class="rb-step"><div class="rb-step-num">' + (i+1) + '</div><div class="rb-step-text">' + p + '</div></div>';
    }).join('');

    card.innerHTML =
      '<div class="rcard-header">' +
        '<span class="rcard-emoji">' + r.emoji + '</span>' +
        '<div class="rcard-info">' +
          '<div class="rcard-name">' + r.nombre + '</div>' +
          '<div class="rcard-meta">' +
            '<span class="badge badge-time">⏱ ' + r.tiempo + '</span>' +
            '<span class="badge badge-protein">💪 Proteína: ' + r.proteina + '</span>' +
          '</div>' +
        '</div>' +
        '<span class="rcard-arrow">▼</span>' +
      '</div>' +
      '<div class="rcard-body">' +
        '<div class="rb-section"><div class="rb-title">Ingredientes</div><ul class="rb-ingr">' + ingrs + '</ul></div>' +
        '<div class="rb-section"><div class="rb-title">Preparación</div><div class="rb-steps">' + steps + '</div></div>' +
        '<div class="rb-tip"><p>💡 ' + r.tip + '</p></div>' +
      '</div>';

    card.querySelector('.rcard-header').addEventListener('click', function() {
      var isOpen = card.classList.contains('open');
      document.querySelectorAll('.rcard').forEach(function(c) { c.classList.remove('open'); });
      if (!isOpen) card.classList.add('open');
    });

    container.appendChild(card);
    if (idx === 0) card.classList.add('open');
  });

  document.getElementById('s1').classList.remove('active');
  document.getElementById('s2').classList.add('active');
  window.scrollTo(0,0);
}
</script>
</body>
</html>
